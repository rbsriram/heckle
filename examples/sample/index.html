<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buggy Checkout, Heckle sample</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 460px; margin: 64px auto; color: #111; }
      .card { border: 1px solid #eee; border-radius: 14px; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,.06); }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .muted { color: #888; font-size: 13px; margin: 0 0 20px; }
      .qty { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
      button { font-size: 15px; padding: 8px 14px; border-radius: 9px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
      .order { width: 100%; background: #111; color: #fff; border: none; padding: 12px; font-weight: 600; margin-top: 10px; }
      .total { font-size: 22px; font-weight: 700; margin: 12px 0; }
      .msg { min-height: 20px; color: #e5484d; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sparkle Mug</h1>
      <p class="muted">The mug that heckles back. $20 each.</p>

      <div class="qty">
        <button id="dec">−</button>
        <span id="qty">1</span>
        <button id="inc">+</button>
      </div>

      <div class="total">Total: <span id="total">$20</span></div>
      <button class="order" id="order">Place order</button>
      <p class="msg" id="msg"></p>
    </div>

    <script>
      const unitPrice = 20;
      let qty = 1;
      const qtyEl = document.getElementById("qty");
      const totalEl = document.getElementById("total");

      function render() {
        qtyEl.textContent = String(qty);
        totalEl.textContent = "$" + qty * unitPrice;
      }

      document.getElementById("inc").addEventListener("click", () => { qty++; render(); });
      document.getElementById("dec").addEventListener("click", () => { qty = Math.max(1, qty - 1); render(); });

      document.getElementById("order").addEventListener("click", async () => {
        console.log("[checkout] placing order", { qty });
        try {
          const res = await fetch("/api/order", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ qty }),
          });
          if (!res.ok) {
            console.error("[checkout] order failed with status", res.status);
            document.getElementById("msg").textContent = "Something went wrong placing your order.";
          } else {
            const order = await res.json();
            document.getElementById("msg").textContent = "Order placed! Total: $" + order.total;
          }
        } catch (e) {
          console.error("[checkout] network error", e);
        }
      });

      console.log("[checkout] ready");
    </script>
  </body>
</html>
